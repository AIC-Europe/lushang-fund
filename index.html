//  云端实时同步层 (Firebase RTDB) — 异地登录 · 数据实时共享
//  设计: 整个业务状态(流水/费用/收入成本/科目/计划/报销)同步到单一节点
//        lushang/state, 任一端保存 → 自动推送; 其他端实时监听 → 自动刷新。
//        采用"版本号 + 最后写入优先"防回环, 未配置云端时自动本地降级。
// ═══════════════════════════════════════════════════════════════════════
var CLOUD_REV=0;            // (保留)
var CLOUD_LAST_AT=0;        // 本端已应用的最新远端时间戳
var _cloudSeeding=false;    // 正在执行首次种子写入
var _cloudApplying=false;   // 正在应用远端数据(避免触发回写)
var _cloudPushT=null;       // 推送防抖计时器
var CLOUD_CONN=false;       // 连接状态
var CLOUD_CLIENT_ID=(Math.random().toString(36).slice(2)+Date.now().toString(36)); // 本端唯一标识
function _collectState(){
  var pd={};P.forEach(function(p,i){pd[i]={pr:p.pr,pp:p.pp};});
  return {
    tx:TX, txVer:TX_VER,
    exp:(typeof EXP!=="undefined"?EXP:[]),
    rc:(typeof RC!=="undefined"?RC:[]),
    ledger:(typeof LEDGER!=="undefined"?LEDGER:{}), ledgerVer:(typeof LEDGER_VER!=="undefined"?LEDGER_VER:0),
    plans:pd,
    reimbDaily:(typeof REIMB_DATA!=="undefined"?REIMB_DATA:[]),
    reimbTravel:(typeof TRAVEL_DATA!=="undefined"?TRAVEL_DATA:[]),
    datevImported:(typeof DATEV_IMPORTED!=="undefined"?DATEV_IMPORTED:[]),
    reimbCleared:(function(){try{return localStorage.getItem("ls-reimb-cleared")==="1";}catch(e){return false;}})()
  };
}
function _applyState(s){
  if(!s)return;
  _cloudApplying=true;
  try{
    if(Array.isArray(s.tx)){TX=s.tx;TXI=1;TX.forEach(function(t){if(t.id>=TXI)TXI=t.id+1;if(!t.party)t.party="";if(!t.remark)t.remark="";});}
    if(Array.isArray(s.exp)){EXP=s.exp;EXI=1;EXP.forEach(function(x){if(x.id>=EXI)EXI=x.id+1;});}
    if(Array.isArray(s.rc)){RC=s.rc;RCI=2000;RC.forEach(function(r){if(r.id>=RCI)RCI=r.id+1;});if(typeof migrateRC_daG==="function"&&migrateRC_daG())window._rcMigratedInApply=true;if(typeof migrateRC_202506==="function"&&migrateRC_202506())window._rcMigratedInApply=true;}
    if(s.ledger&&typeof s.ledger==="object"){for(var lk in s.ledger)LEDGER[lk]=s.ledger[lk];}
    if(s.plans){Object.keys(s.plans).forEach(function(k){var i=parseInt(k);if(P[i]){if(s.plans[k].pr)P[i].pr=s.plans[k].pr;if(s.plans[k].pp)P[i].pp=s.plans[k].pp;}});}
    if(Array.isArray(s.reimbDaily)){REIMB_DATA=s.reimbDaily;REIMB_ID=1;REIMB_DATA.forEach(function(r){if(r.id>=REIMB_ID)REIMB_ID=r.id+1;});}
    if(Array.isArray(s.reimbTravel)){TRAVEL_DATA=s.reimbTravel;TRAVEL_ID=1;TRAVEL_DATA.forEach(function(r){if(r.id>=TRAVEL_ID)TRAVEL_ID=r.id+1;});}
    if(Array.isArray(s.datevImported)){DATEV_IMPORTED=s.datevImported;if(typeof rebuildDR==="function")rebuildDR();}
    if(s.reimbCleared!==undefined){try{if(s.reimbCleared)localStorage.setItem("ls-reimb-cleared","1");else localStorage.removeItem("ls-reimb-cleared");}catch(e){}}
    // 同步落地到本地, 保证离线时也有最新副本
    try{savDLocal();if(typeof savReimb==="function")savReimbLocal();if(typeof savDatevLocal==="function")savDatevLocal();}catch(e){}
  }catch(e){console.error("applyState:",e);}
  _cloudApplying=false;
  if(window._rcMigratedInApply){window._rcMigratedInApply=false;try{if(typeof cloudPush==="function")cloudPush();}catch(e){}}
}
function cloudPush(){
  if(!USE_CLOUD||!rtdb||_cloudApplying)return;
  if(_cloudPushT)clearTimeout(_cloudPushT);
  _cloudPushT=setTimeout(function(){
    try{
      var payload=_collectState();
      payload._at=Date.now(); CLOUD_LAST_AT=payload._at;
      payload._by=(typeof U!=="undefined"&&U)?U:"unknown"; payload._client=CLOUD_CLIENT_ID;
      rtdb.ref("lushang/state").set(payload).catch(function(e){console.warn("cloud push:",e.message);});
    }catch(e){console.error("cloudPush:",e);}
  },400);
}
function cloudStart(){
  if(!USE_CLOUD||!rtdb)return;
  // 连接状态监听
  try{ rtdb.ref(".info/connected").on("value",function(snap){ CLOUD_CONN=!!snap.val(); updateCloudBadge(); }); }catch(e){}
  // 数据实时监听
  rtdb.ref("lushang/state").on("value",function(snap){
    var s=snap.val();
    if(!s){
      // 云端为空 → 用事务确保仅一端写入初始(种子/本地)数据, 避免多端竞争重复种子
      if(typeof U!=="undefined"&&U && !_cloudSeeding){
        _cloudSeeding=true;
        try{
          rtdb.ref("lushang/state").transaction(function(cur){
            if(cur)return; // 已有人种入, 放弃
            var payload=_collectState();
            payload._at=Date.now(); payload._by=(typeof U!=="undefined"&&U)?U:"unknown"; payload._client=CLOUD_CLIENT_ID;
            CLOUD_LAST_AT=payload._at;
            return payload;
          },function(err){ _cloudSeeding=false; });
        }catch(e){ _cloudSeeding=false; }
      }
      return;
    }
    _cloudSeeding=false;
    // 跳过本端自己写入的回声
    if(s._client===CLOUD_CLIENT_ID){ CLOUD_LAST_AT=Math.max(CLOUD_LAST_AT,s._at||0); return; }
    // 仅应用比本端已知更"新"的远端数据
    if((s._at||0)<=CLOUD_LAST_AT){ return; }
    CLOUD_LAST_AT=s._at||0;
    _applyState(s);
    if(typeof render==="function"){try{render();if(typeof bMT==="function")bMT();}catch(e){}}
    if(s._by && s._client!==CLOUD_CLIENT_ID && typeof toast==="function"){toast("☁ 已同步 "+s._by+" 的更新");}
    updateCloudBadge();
  });
}

function _fmtTS(d){d=d||new Date();function p(n){return(n<10?"0":"")+n;}return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+"_"+p(d.getHours())+p(d.getMinutes());}

var BACKUP_REMIND_DAYS=7;   // 超过这么多天没备份就提醒

function daysSinceBackup(){var t=getLastBackup();if(!t)return null;return Math.floor((Date.now()-t)/86400000);}
function checkBackupReminder(){

  setTimeout(function(){
    var last=getLastBackup();

    if(last===0 || (days!==null && days>=BACKUP_REMIND_DAYS)){

function doBackupExport(){
  try{
    var state=_collectState();
    var backup={
      _app:"lushang-fund",
      _backupVersion:1,
      _exportedAt:new Date().toISOString(),
      _exportedBy:(typeof U!=="undefined"&&U)?U:"unknown",
      _counts:{
        银行流水:(state.tx||[]).length,
        费用:(state.exp||[]).length,
        收入成本:(state.rc||[]).length,
        日常报销:(state.reimbDaily||[]).length,
        差旅报销:(state.reimbTravel||[]).length
      },
      state:state
    };
    var json=JSON.stringify(backup,null,2);
    var blob=new Blob([json],{type:"application/json;charset=utf-8"});
    var url=URL.createObjectURL(blob);

function doBackupImportFile(input){
  var f=input.files&&input.files[0];if(!f){return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var st=data.state||data; // 兼容直接是 state 的情况
      if(!st||(!st.tx&&!st.exp&&!st.rc)){toast("文件格式不正确, 不是有效的备份");input.value="";return;}
      var c=(data._counts)||{};
      var msg="确认从备份恢复数据？\n\n";
      if(data._exportedAt){msg+="备份时间: "+new Date(data._exportedAt).toLocaleString()+"\n";}
      if(data._exportedBy){msg+="备份人: "+data._exportedBy+"\n";}
      msg+="\n包含: 银行流水 "+((st.tx||[]).length)+" 笔 · 费用 "+((st.exp||[]).length)+" 笔 · 收入成本 "+((st.rc||[]).length)+" 笔\n";

      // 套用到本地状态
      _applyState(st);

// ═══ DATEV ACCOUNTING DATA ═══
var KONTO2026=[];
var DATEV_IMPORTED=[]; // 用户导入的外部账DATEV增量数据(独立于DD历史数据), 参与云端同步与本地持久化
var DD=[]; // 2019-2025 历史DATEV凭证: 已从文件中移出(瘦身约2.3MB), 改为按需从本地缓存/云端加载(见下方 loadDD)
// ═══════════════════════════════════════════════════════════════════════
//  历史数据(DD) 按需加载
//  优先级: IndexedDB本地缓存(秒开/离线可用) → 云端 lushang/histdata → 提示上传数据包
//  首次使用: 在"DATEV导入"页上传一次 鲁商_历史数据包.json, 自动写入云端+本地缓存,
//  之后所有设备打开时自动加载, 无需再带着大文件。
// ═══════════════════════════════════════════════════════════════════════
var DD_STATUS="idle";   // idle|loading|ready|missing|error
var DD_SOURCE="";       // cache|cloud|file
var DD_AT=0;
var _IDB_NAME="lushang-hist",_IDB_STORE="kv";
function _idb(cb){
  try{
    var req=indexedDB.open(_IDB_NAME,1);
    req.onupgradeneeded=function(){try{req.result.createObjectStore(_IDB_STORE);}catch(e){}};
    req.onsuccess=function(){cb(req.result);};
    req.onerror=function(){cb(null);};
  }catch(e){cb(null);}
}
function ddCacheGet(cb){
  _idb(function(db){
    if(!db){cb(null);return;}
    try{
      var rq=db.transaction(_IDB_STORE,"readonly").objectStore(_IDB_STORE).get("histdata");
      rq.onsuccess=function(){cb(rq.result||null);};
      rq.onerror=function(){cb(null);};
    }catch(e){cb(null);}
  });
}
function ddCacheSet(obj){
  _idb(function(db){
    if(!db)return;
    try{db.transaction(_IDB_STORE,"readwrite").objectStore(_IDB_STORE).put(obj,"histdata");}catch(e){}
  });
}
function ddCacheClear(cb){
  _idb(function(db){
    if(!db){if(cb)cb();return;}
    try{var rq=db.transaction(_IDB_STORE,"readwrite").objectStore(_IDB_STORE).delete("histdata");rq.onsuccess=function(){if(cb)cb();};rq.onerror=function(){if(cb)cb();};}
    catch(e){if(cb)cb();}
  });
}
function _applyHistPack(pack,source){
  if(!pack)return false;
  var rows=pack.dd;
  if(typeof rows==="string"){try{rows=JSON.parse(rows);}catch(e){rows=null;}}
  if(!Array.isArray(rows)||!rows.length)return false;
  DD=rows;DD_AT=pack.at||0;DD_STATUS="ready";DD_SOURCE=source;
  // 报销种子数据: 仅当本机报销记录为空且未手动清空过时补种(兼容全新设备离线场景)
  try{
    var cleared=localStorage.getItem("ls-reimb-cleared")==="1";
    if(!cleared&&Array.isArray(pack.reimbInit)&&pack.reimbInit.length&&typeof REIMB_DATA!=="undefined"&&REIMB_DATA.length===0){
      REIMB_DATA=JSON.parse(JSON.stringify(pack.reimbInit));REIMB_ID=1;REIMB_DATA.forEach(function(r){if(r.id>=REIMB_ID)REIMB_ID=r.id+1;});
      if(typeof savReimbLocal==="function")savReimbLocal();
    }
    if(!cleared&&Array.isArray(pack.travelInit)&&pack.travelInit.length&&typeof TRAVEL_DATA!=="undefined"&&TRAVEL_DATA.length===0){
      TRAVEL_DATA=JSON.parse(JSON.stringify(pack.travelInit));TRAVEL_ID=1;TRAVEL_DATA.forEach(function(r){if(r.id>=TRAVEL_ID)TRAVEL_ID=r.id+1;});
      if(typeof savReimbLocal==="function")savReimbLocal();
    }
  }catch(e){}
  if(typeof rebuildDR==="function")rebuildDR();
  if(typeof render==="function"){try{render();}catch(e){}}
  return true;
}
function loadDD(){
  if(DD_STATUS==="loading"||DD_STATUS==="ready")return;
  DD_STATUS="loading";
  setTimeout(function(){if(DD_STATUS==="loading"){DD_STATUS="error";if(typeof render==="function"){try{render();}catch(e){}}}},15000);
  if(typeof render==="function"){try{render();}catch(e){}}
  ddCacheGet(function(cached){
    var hadCache=false;
    if(cached&&_applyHistPack(cached,"cache"))hadCache=true;
    if(USE_CLOUD&&rtdb){
      // 只先读版本号(几十字节), 有更新才拉全量, 省流量
      rtdb.ref("lushang/histdata/at").once("value").then(function(s){
        var at=s.val()||0;
        if(!at){
          if(!hadCache){DD_STATUS="missing";if(typeof render==="function"){try{render();}catch(e){}}}
          return;
        }
        if(hadCache&&at===DD_AT)return; // 本地缓存即最新
        return rtdb.ref("lushang/histdata").once("value").then(function(s2){
          var v=s2.val();if(!v||!v.json)return;
          var pack={at:v.at||at,dd:v.json,reimbInit:null,travelInit:null};
          if(v.extra){try{var ex=JSON.parse(v.extra);pack.reimbInit=ex.reimbInit;pack.travelInit=ex.travelInit;}catch(e){}}
          if(_applyHistPack(pack,"cloud")){
            ddCacheSet({at:DD_AT,dd:DD,reimbInit:pack.reimbInit,travelInit:pack.travelInit});
            if(typeof toast==="function")toast("☁ 历史数据已从云端加载 ("+DD.length+"条)");
          }
        });
      }).catch(function(e){
        if(!hadCache){DD_STATUS="error";if(typeof render==="function"){try{render();}catch(e2){}}}
      });
    }else if(!hadCache){
      DD_STATUS="missing";
      if(typeof render==="function"){try{render();}catch(e){}}
    }
  });
}
function uploadHistPackClick(){var i=document.getElementById("histPackInput");if(i)i.click();}
function uploadHistPackFile(input){
  var f=input.files&&input.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      var rows=Array.isArray(data)?data:(data.dd||data.DD);
      if(!Array.isArray(rows)||!rows.length||!rows[0].k||!rows[0].m){toast("文件格式不正确, 请选择 鲁商_历史数据包.json");input.value="";return;}
      var pack={at:Date.now(),dd:rows,reimbInit:(data.reimbInit||null),travelInit:(data.travelInit||null)};
      _applyHistPack(pack,"file");
      ddCacheSet({at:pack.at,dd:rows,reimbInit:pack.reimbInit,travelInit:pack.travelInit});
      if(USE_CLOUD&&rtdb){
        var payload={at:pack.at,count:rows.length,json:JSON.stringify(rows)};
        if(pack.reimbInit||pack.travelInit)payload.extra=JSON.stringify({reimbInit:pack.reimbInit,travelInit:pack.travelInit});
        rtdb.ref("lushang/histdata").set(payload)
          .then(function(){toast("✅ 历史数据已上传云端 ("+rows.length+"条), 其他设备将自动加载");})
          .catch(function(e){toast("云端上传失败: "+e.message+" (本机已可用)");});
      }else{toast("✅ 历史数据已载入本机 ("+rows.length+"条)");}
      if(typeof render==="function")render();
      input.value="";
    }catch(e){toast("读取失败: "+e.message);input.value="";}
  };
  reader.onerror=function(){toast("读取文件失败");input.value="";};
  reader.readAsText(f);
}
function ddReloadFromCloud(){
  ddCacheClear(function(){
    DD_STATUS="idle";DD_AT=0;DD=[];
    loadDD();
    if(typeof toast==="function")toast("正在从云端重新加载历史数据…");
  });
}

// ═══════════════════════════════════════════════════════════════════════
//  云端快照历史 (自动每日 + 手动)
//  · 每天首次使用(已连云端)自动保存一份完整业务状态快照到 lushang/snapshots/{ts}
//  · 保留最近 SNAP_KEEP 份, 自动清理更早的
//  · 任何设备可在"数据备份"页查看/恢复/删除
//  · 快照不含历史DD数据(DD为静态数据, 单独存于 lushang/histdata), 体积小
// ═══════════════════════════════════════════════════════════════════════
var SNAP_KEEP=30;
function snapshotSave(auto,cb){
  if(!USE_CLOUD||!rtdb){if(!auto&&typeof toast==="function")toast("未连接云端, 无法创建云端快照(可用导出备份文件代替)");if(cb)cb(false);return;}
  try{
    var ts=Date.now();
    var st=_collectState();
    var meta={at:ts,by:(typeof U!=="undefined"&&U)?U:"unknown",auto:auto?1:0,
      c:{tx:(st.tx||[]).length,exp:(st.exp||[]).length,rc:(st.rc||[]).length,rd:(st.reimbDaily||[]).length,rt:(st.reimbTravel||[]).length,dv:(st.datevImported||[]).length}};
    rtdb.ref("lushang/snapshots/"+ts).set({meta:meta,state:st}).then(function(){
      return rtdb.ref("lushang/snapmeta/"+ts).set(meta);
    }).then(function(){
      try{localStorage.setItem("ls-last-autosnap",String(ts));}catch(e){}
      if(!auto&&typeof toast==="function")toast("📸 云端快照已创建");
      pruneSnapshots();
      if(cb)cb(true);
    }).catch(function(e){if(!auto&&typeof toast==="function")toast("快照失败: "+e.message);if(cb)cb(false);});
  }catch(e){if(!auto&&typeof toast==="function")toast("快照失败: "+e.message);if(cb)cb(false);}
}
function pruneSnapshots(){
  if(!USE_CLOUD||!rtdb)return;
  rtdb.ref("lushang/snapmeta").once("value").then(function(snap){
    var v=snap.val()||{};var keys=Object.keys(v).sort();
    while(keys.length>SNAP_KEEP){
      var k=keys.shift();
      rtdb.ref("lushang/snapshots/"+k).remove();
      rtdb.ref("lushang/snapmeta/"+k).remove();
    }
  }).catch(function(){});
}
function scheduleAutoSnapshot(){
  if(!USE_CLOUD||!rtdb)return;
  setTimeout(function(){
    try{
      var last=parseInt(localStorage.getItem("ls-last-autosnap")||"0");
      if(Date.now()-last>=86400000)snapshotSave(true); // 每24小时自动一次
    }catch(e){}
  },6000);
}
function restoreSnapshot(ts){
  if(!USE_CLOUD||!rtdb)return;
  rtdb.ref("lushang/snapshots/"+ts).once("value").then(function(snap){
    var v=snap.val();
    if(!v||!v.state){toast("快照不存在或已损坏");return;}
    var m=v.meta||{};
    var msg="确认恢复到该云端快照？\n\n快照时间: "+new Date(m.at||parseInt(ts)).toLocaleString()
      +"\n创建人: "+(m.by||"?")+(m.auto?" (自动)":" (手动)")
      +"\n\n⚠ 将覆盖当前全部业务数据并同步到所有设备。\n建议先点\"立即创建快照\"或导出备份留底。\n\n是否继续？";
    if(!confirm(msg))return;
    _applyState(v.state);
    if(typeof cloudPush==="function")cloudPush();
    if(typeof savDLocal==="function")savDLocal();
    if(typeof savReimbLocal==="function")savReimbLocal();
    if(typeof render==="function"){render();if(typeof bMT==="function")bMT();}
    toast("✅ 已恢复到快照 "+new Date(m.at||parseInt(ts)).toLocaleString());
  }).catch(function(e){toast("读取快照失败: "+e.message);});
}
function deleteSnapshot(ts){
  if(!USE_CLOUD||!rtdb)return;
  if(!confirm("删除该云端快照？此操作不可恢复。"))return;
  rtdb.ref("lushang/snapshots/"+ts).remove();
  rtdb.ref("lushang/snapmeta/"+ts).remove().then(function(){toast("已删除快照");renderSnapList();}).catch(function(e){toast("删除失败: "+e.message);});
}
function renderSnapList(){
  var box=document.getElementById("snapList");if(!box)return;
  if(!USE_CLOUD||!rtdb){box.innerHTML='<div style="font-size:10px;color:#8B7355;padding:6px 0">本地模式或云端未连接, 云端快照不可用, 请使用上方"导出备份文件"。</div>';return;}
  var _snapDone=false;setTimeout(function(){if(!_snapDone&&box)box.innerHTML='<div style="font-size:10px;color:#D97706;padding:6px 0">⏳ 云端响应超时(网络?), 可稍后重新打开本页重试。</div>';},8000);
  box.innerHTML='<div style="font-size:10px;color:#8B7355;padding:6px 0">⏳ 正在读取云端快照列表…</div>';
  rtdb.ref("lushang/snapmeta").once("value").then(function(snap){
    _snapDone=true;

      var isXferIn=t.note==="采购货款"||t.note==="增值税退税"||t.note==="银行利息"||t.note==="内部换汇";
      if(t.type==="IN"){

  });
  var totalIn=bizIn+xferIn,totalOut=bizOut+expOut+xferOut;

function gatherBankRows(cur,m){
  var pids=P.filter(function(p){return p.cur===cur;}).map(function(p){return p.id;});
  var feePid=cur==="EUR"?99:cur==="USD"?98:-1;
  var rows=[];
  TX.forEach(function(t){

      if(pids.indexOf(t.pid)>-1){
        var pn=P.filter(function(p){return p.id===t.pid;})[0];
        rows.push({日期:t.date,类型:t.type==="IN"?"进账":"出账",分类:"业务",供应商客户:t.party||"",金额:t.amount,备注:t.note||"",银行附言:t.remark||"",项目:pn?pn.name:""});

  rows.sort(function(a,b){return a.日期<b.日期?-1:a.日期>b.日期?1:0;});

function calcBankBal(cur){
  var a=BANK_ACCTS[cur];if(!a)return[];
  var opening=a.bal['2025-12']||0;
  var rows=[],bal=opening;
  for(var m=1;m<=12;m++){
    var bd=bankMonth(cur,m);
    if(bd.totalIn===0&&bd.totalOut===0&&m>6)continue;
    var ob=bal;
    var mKey='2026-'+String(m).padStart(2,'0');
    var knownBal=a.bal[mKey];
    var cb=knownBal!==undefined?knownBal:(bal+bd.net);
    rows.push({m:m,open:ob,close:cb,bd:bd});
    bal=cb;
  }
  return{opening:opening,latest:bal,rows:rows};
}

function gapData(cur){
  var cb=calcBankBal(cur);
  var rows=[];
  var ps=P.filter(function(p){return p.cur===cur;});
  // For months 1-5: use actual bank data (locked)
  // For months 6+: project from last actual balance using plan data
  var lastActualBal=cb.rows.length>0?cb.rows[cb.rows.length-1].close:cb.opening;
  var lastActualMonth=cb.rows.length>0?cb.rows[cb.rows.length-1].m:0;
  for(var m=1;m<=12;m++){
    var row={m:m};
    var bankRow=cb.rows.filter(function(r){return r.m===m;})[0];
    if(bankRow&&m<=lastActualMonth){
      // Locked month: actual bank data
      row.open=bankRow.open;
      row.close=bankRow.close;
      row.net=bankRow.close-bankRow.open;
      row.planIn=0;row.planOut=0;
      ps.forEach(function(p){row.planIn+=p.pr[m-1];row.planOut+=p.pp[m-1];});
      row.locked=true;
    }else{
      // Future month: project from plan
      row.open=(m===lastActualMonth+1)?lastActualBal:(m>1?rows[m-2].close:cb.opening);
      row.planIn=0;row.planOut=0;
      ps.forEach(function(p){row.planIn+=p.pr[m-1];row.planOut+=p.pp[m-1];});
      row.net=row.planIn-row.planOut;
      row.close=row.open+row.net;
      row.locked=false;
    }
    rows.push(row);
  }
  return rows;
}

// 增值税"实收退税"统一计算: 合并 DATEV 1780 与 银行流水TX(增值税退税), 按日期+金额去重
function _vatNormDate(dateStr){var s=String(dateStr||"");var m1=s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);if(m1)return m1[3]+m1[2]+m1[1];var m2=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m2)return m2[1]+m2[2]+m2[3];return s.replace(/[^0-9]/g,"");}

var _VAT_ACCT_LABEL={"1780":"本期(1780)","1790":"上年(1790)","1791":"往年(1791)","1545":"预付(1545)"};
var _VAT_REFUND_ACCTS=["1780","1790","1791","1545"];
function computeVATRefunds(year){
  var out=[],seen={},dateSum={};
  // 现金退税: 任一增值税结算科目(1780本期/1790上年/1791往年/1545预付)贷方(H>0) 且 对方为银行(1200/1210)
  DATEV_REC.forEach(function(r){
    if(_VAT_REFUND_ACCTS.indexOf(r.k)<0||isEB(r))return;
    if(String(r.m).slice(0,4)!==year)return;
    if(!(r.h>0&&(r.g==="1200"||r.g==="1210")))return;
    var nd=_vatNormDate(r.d);
    var k=nd+"|"+r.k+"|"+Math.round(r.h*100);if(seen[k])return;seen[k]=1;
    dateSum[nd]=(dateSum[nd]||0)+r.h; // 记录该日DATEV退税合计(可能拆成多笔)
    out.push({d:r.d,m:r.m,h:r.h,t:r.t,_src:"DATEV",_acct:r.k,_period:_VAT_ACCT_LABEL[r.k]||r.k});
  });
  (typeof TX!=="undefined"?TX:[]).forEach(function(t){
    if(t.type!=="IN")return;
    if(String(t.note||"").indexOf("增值税退税")<0 && String(t.remark||"").toUpperCase().indexOf("ERSTATT")<0)return;
    if(String(t.date||"").slice(0,4)!==year)return;
    var nd=_vatNormDate(t.date);
    // 若该日DATEV已有退税入账(单笔或拆分多笔合计已覆盖此金额), 则银行流水这笔视为重复, 跳过
    if((dateSum[nd]||0)>=(t.amount||0)-0.01)return;
    var k=nd+"|"+Math.round((t.amount||0)*100);if(seen[k])return;seen[k]=1;
    out.push({d:t.date,m:String(t.date).slice(0,7),h:t.amount,t:(t.remark||t.note||"银行到账"),_src:"银行流水",_period:"银行流水"});
  });
  out.sort(function(a,b){var da=_vatNormDate(a.d),db=_vatNormDate(b.d);return da<db?-1:da>db?1:0;});

}

function computeVATPayments(year){

  DATEV_REC.forEach(function(r){
    if(_VAT_REFUND_ACCTS.indexOf(r.k)<0||isEB(r))return;
    if(String(r.m).slice(0,4)!==year)return;

    out.push({d:r.d,m:r.m,s:r.s,t:r.t,_acct:r.k,_period:_VAT_ACCT_LABEL[r.k]||r.k});

}

// ── 月度汇总 ──
function rReimbSummary(){

var dim=window._reimbMonthDim||"posting";
function moOf(r){
  if(dim==="paid"){var pd=String(r.paid_date||"").trim();return (pd.length>=7)?pd.slice(0,7):"未付款";}
  return r.posting_month||"未填";
}
var byMonth={};
REIMB_DATA.forEach(function(r){var mo=moOf(r);if(!byMonth[mo])byMonth[mo]={dailyTot:0,travelTot:0,dailyCount:0,travelCount:0,byEmpD:{},byEmpT:{}};var v=parseFloat(r.approved_amount||r.total_amount||r.amount)||0;byMonth[mo].dailyTot+=v;byMonth[mo].dailyCount++;var emp=r.employee||"未填";if(!byMonth[mo].byEmpD[emp])byMonth[mo].byEmpD[emp]=0;byMonth[mo].byEmpD[emp]+=v;});
TRAVEL_DATA.forEach(function(r){var mo=moOf(r);if(!byMonth[mo])byMonth[mo]={dailyTot:0,travelTot:0,dailyCount:0,travelCount:0,byEmpD:{},byEmpT:{}};var v=parseFloat(r.approved_amount||r.total_amount||r.amount)||0;byMonth[mo].travelTot+=v;byMonth[mo].travelCount++;var emp=r.employee||"未填";if(!byMonth[mo].byEmpT)byMonth[mo].byEmpT={};if(!byMonth[mo].byEmpT[emp])byMonth[mo].byEmpT[emp]=0;byMonth[mo].byEmpT[emp]+=v;});

[["posting","应报销月份(入账)"],["paid","实际报销月份(按付款日)"]].forEach(function(o){
  var active=dim===o[0];

h+='</div>';
// Monthly table

months.forEach(function(mo){h+='<th class="tr">'+mo+'</th>';});

[{l:"📋 日常垫付-金额",k:"dailyTot",c:"#A855F7",heavy:true},{l:"📋 日常垫付-笔数",k:"dailyCount",c:"#8B7355"},{l:"🧳 出差报销-金额",k:"travelTot",c:"#3B82F6",heavy:true},{l:"🧳 出差报销-笔数",k:"travelCount",c:"#8B7355"},{l:"✨ 合计金额",compute:true,c:"#059669",heavy:true}].forEach(function(row){

if(empList.length){

// 数据导入: 读取xlsx, 按表头映射字段, 追加到对应数据集并保存/同步
function importReimbExcel(section,input){
  try{localStorage.removeItem("ls-reimb-cleared");}catch(e){}
  var file=input.files[0];if(!file){return;}
  if(typeof XLSX==="undefined"){toast("XLSX未加载");input.value="";return;}
  var isT=section==="travel";var cols=isT?REIMB_COLS_TRAVEL:REIMB_COLS_DAILY;
  // 建立"表头文字→字段名"映射(同时支持纯中文名, 容错括号说明)
  var hmap={};cols.forEach(function(c){hmap[c[0]]=c[1];hmap[c[0].replace(/\(.*?\)/g,"").trim()]=c[1];});
  var numFields={amount:1,vat_rate:1,tax_amount:1,total_amount:1,approved_amount:1,over_amount:1,days:1};
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      if(!rows.length){toast("文件为空");input.value="";return;}
      // 第一行为表头, 建立列索引→字段
      var head=rows[0].map(function(x){return String(x==null?"":x).trim();});
      var idx2field=head.map(function(hh){return hmap[hh]||hmap[hh.replace(/\(.*?\)/g,"").trim()]||null;});
      var added=0,skipped=0;
      for(var i=1;i<rows.length;i++){
        var row=rows[i];if(!row||row.every(function(c){return c==null||String(c).trim()==="";}))continue;
        var obj={};idx2field.forEach(function(f,ci){if(!f)return;var val=row[ci];if(val==null)val="";obj[f]=val;});
        // 跳过示例行/空关键字段
        if(String(obj.remark||"").indexOf("示例行")>=0){skipped++;continue;}
        if(!obj.posting_month&&!obj.reimb_no&&!obj.amount&&!obj.total_amount){skipped++;continue;}
        // 数字字段转换
        Object.keys(numFields).forEach(function(f){if(obj[f]!==undefined&&obj[f]!==""){var n=parseFloat(String(obj[f]).replace(/[^0-9.\-]/g,""));obj[f]=isNaN(n)?0:n;}else obj[f]=obj[f]===""?0:obj[f];});
        // 月份/日期规范成字符串
        ["posting_month","submit_date","paid_date","travel_start","travel_end"].forEach(function(f){if(obj[f]!=null)obj[f]=String(obj[f]).trim();});
        // 补默认
        if(!obj.currency)obj.currency="EUR";
        if(!obj.posting_month&&obj.submit_date&&obj.submit_date.length>=7)obj.posting_month=obj.submit_date.slice(0,7);
        obj.employee=obj.employee||"";
        // 分配ID
        if(isT){obj.id=TRAVEL_ID++;obj.seq_no=obj.seq_no||obj.id;TRAVEL_DATA.push(obj);}
        else{obj.id=REIMB_ID++;obj.seq_no=obj.seq_no||obj.id;REIMB_DATA.push(obj);}
        added++;
      }
      savReimb();
      toast("导入完成: 新增"+added+"条"+(skipped?(" (跳过"+skipped+"行)"):""));
      render();
    }catch(err){toast("导入失败: "+err.message);}
    input.value="";
  };
  reader.readAsArrayBuffer(file);
}

// ═══ Ledger CRUD ═══
var ledgerEdit=null; // {pid,oi,pi} pi=-1 means order header
var ledgerAddOrder=null; // pid or null
var ledgerAddPay=null; // {pid,oi} or null
function addLedgerOrder(pid){
if(!LEDGER[pid])LEDGER[pid]=[];
LEDGER[pid].push({id:"NEW",contract:"",terms:"FOB",supplier:"",qty:0,cur:"USD",days:120,purchaseAmt:0,salesAmt:0,deposit:0,depositDate:"",invoiceNo:"",payments:[]});
ledgerEdit={pid:pid,oi:LEDGER[pid].length-1,pi:-1};savD();render();}
function addLedgerPay(pid,oi){
var o=LEDGER[pid][oi];if(!o)return;
o.payments.push({seq:o.payments.length+1,ratio:"",cur:o.cur,payDate:"",paidAmt:0,dueDate:"",actualDate:"",dueAmt:0,receivedAmt:0,unpaid:0,note:""});
ledgerEdit={pid:pid,oi:oi,pi:o.payments.length-1};savD();render();}
function editLedger(pid,oi,pi){ledgerEdit={pid:pid,oi:oi,pi:pi};render();}
function cancelLedgerEdit(){ledgerEdit=null;render();}
function saveLedgerOrder(pid,oi){
var o=LEDGER[pid][oi];if(!o)return;
o.id=document.getElementById("leId").value;o.contract=document.getElementById("leContract").value;
o.terms=document.getElementById("leTerms").value;o.supplier=document.getElementById("leSupplier").value;
o.qty=parseInt(document.getElementById("leQty").value)||0;o.cur=document.getElementById("leCur").value;
o.days=parseInt(document.getElementById("leDays").value)||120;
o.purchaseAmt=parseFloat(document.getElementById("lePurchase").value)||0;
o.salesAmt=parseFloat(document.getElementById("leSales").value)||0;
o.deposit=parseFloat(document.getElementById("leDeposit").value)||0;
o.depositDate=document.getElementById("leDepositDate").value;
o.invoiceNo=document.getElementById("leInvNo").value;
ledgerEdit=null;savD();toast("订单已保存");render();}
function saveLedgerPay(pid,oi,pi){
var pm=LEDGER[pid][oi].payments[pi];if(!pm)return;
pm.ratio=document.getElementById("lpRatio").value;pm.cur=document.getElementById("lpCur").value;pm.payDate=document.getElementById("lpPayDate").value;
pm.paidAmt=parseFloat(document.getElementById("lpPaidAmt").value)||0;
pm.dueDate=document.getElementById("lpDueDate").value;pm.actualDate=document.getElementById("lpActualDate").value;
pm.dueAmt=parseFloat(document.getElementById("lpDueAmt").value)||0;pm.receivedAmt=parseFloat(document.getElementById("lpReceivedAmt").value)||0;
var manualUnpaid=document.getElementById("lpUnpaid").value;
pm.unpaid=(manualUnpaid!=="")?parseFloat(manualUnpaid)||0:Math.round(((pm.dueAmt||0)-pm.receivedAmt)*100)/100;
pm.note=document.getElementById("lpNote").value;
ledgerEdit=null;savD();toast("付款记录已保存");render();}
function delLedgerOrder(pid,oi){if(!confirm("第1步确认：删除订单 "+LEDGER[pid][oi].id+" 及所有付款记录？"))return;if(!confirm("第2步确认：删除后不可恢复，是否继续？"))return;LEDGER[pid].splice(oi,1);savD();toast("订单已删除");render();}
function delLedgerPay(pid,oi,pi){if(!confirm("第1步确认：删除此笔付款记录？"))return;if(!confirm("第2步确认：删除后不可恢复，是否继续？"))return;LEDGER[pid][oi].payments.splice(pi,1);savD();toast("付款记录已删除");render();}

function exportBizLedger(pid){
var ld=LEDGER[pid];if(!ld||!ld.length){toast("无数据可导出");return;}
var pn="";P.forEach(function(p){if(p.id===pid)pn=p.name;});
var rows=[["订单号","采购合同号","贸易术语","上游供应商","柜数","币种","账期(天)","采购合同金额","销售合同金额","保证金","保证金到账日","销售发票号","付款序号","付款比例","币种","付款日期","已付采购金额","应回款日期","实际回款日期","应回款金额","回款金额","未回金额","备注"]];

if(!o.payments.length){rows.push([o.id,o.contract,o.terms,o.supplier,o.qty,o.cur,o.days,o.purchaseAmt,o.salesAmt,o.deposit,o.depositDate,o.invoiceNo,"","","","","","","","",""]);}
o.payments.forEach(function(pm,pi){
var r=pi===0?[o.id,o.contract,o.terms,o.supplier,o.qty,o.cur,o.days,o.purchaseAmt,o.salesAmt,o.deposit,o.depositDate,o.invoiceNo]:["","","","","","","","","","","",""];
r.push(pm.seq,pm.ratio,pm.cur||o.cur,pm.payDate,pm.paidAmt,pm.dueDate,pm.actualDate,pm.dueAmt||0,pm.receivedAmt,pm.unpaid||0,pm.note||"");
rows.push(r);});});

var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,pn||"台账");
XLSX.writeFile(wb,(pn||"业务台账")+"_"+new Date().toISOString().slice(0,10)+".xlsx");
toast("已导出Excel");}
